name: Benchmark Upload

on:
  workflow_run:
    workflows: [ Benchmark ]
    types: [ completed ]

permissions:
  contents: read
  pull-requests: write
  actions: read  # needed to download artifacts from the triggering workflow

jobs:
  upload-pr:
    name: Upload Benchmark Results
    runs-on: ubuntu-latest
    if: |
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'pull_request'
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: bencherdev/bencher@fa25a72c516046b4c0e31659bef70c5266b0f94d # v0.6.4

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: bench-results
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ github.event.workflow_run.id }}

      - name: Upload to Bencher
        env:
          BENCHER_API_TOKEN: ${{ secrets.BENCHER_API_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          bencher run \
            --project sriracha \
            --branch "$(cat head-ref.txt)" \
            --start-point "$(cat base-ref.txt)" \
            --start-point-hash "$(cat base-sha.txt)" \
            --start-point-clone-thresholds \
            --start-point-reset \
            --testbed ubuntu-latest \
            --adapter go_bench \
            --err \
            --github-actions "${GITHUB_TOKEN}" \
            --ci-number "$(cat pr-number.txt)" \
            < results.txt

      - name: Upload quality metrics to Bencher
        # Always attempt the quality upload, even if the go_bench upload
        # above failed. With --err, a regression alert exits non-zero,
        # which by default skips every subsequent step (implicit
        # if: success()) — so a single regression in micro-benchmarks
        # would silently drop quality metrics. Each step still uses --err,
        # so a regression in either uploader still fails the job.
        if: always()
        env:
          BENCHER_API_TOKEN: ${{ secrets.BENCHER_API_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          bencher run \
            --project sriracha \
            --branch "$(cat head-ref.txt)" \
            --start-point "$(cat base-ref.txt)" \
            --start-point-hash "$(cat base-sha.txt)" \
            --start-point-clone-thresholds \
            --start-point-reset \
            --testbed ubuntu-latest \
            --adapter json \
            --err \
            --github-actions "${GITHUB_TOKEN}" \
            --ci-number "$(cat pr-number.txt)" \
            --file quality.json

  upload-main:
    name: Upload Main Benchmark Results
    runs-on: ubuntu-latest
    if: |
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push'
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: bencherdev/bencher@fa25a72c516046b4c0e31659bef70c5266b0f94d # v0.6.4
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: bench-results-main
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ github.event.workflow_run.id }}
      - name: Upload to Bencher
        env:
          BENCHER_API_TOKEN: ${{ secrets.BENCHER_API_TOKEN }}
        run: |
          bencher run \
            --project sriracha \
            --branch main \
            --testbed ubuntu-latest \
            --adapter go_bench \
            --err \
            < results.txt

      - name: Upload quality metrics to Bencher
        # See upload-pr's quality step for the rationale; same reason here.
        if: always()
        env:
          BENCHER_API_TOKEN: ${{ secrets.BENCHER_API_TOKEN }}
        run: |
          bencher run \
            --project sriracha \
            --branch main \
            --testbed ubuntu-latest \
            --adapter json \
            --err \
            --file quality.json