name: Benchmark Upload

on:
  workflow_run:
    workflows: [ Benchmark ]
    types: [ completed ]

permissions:
  contents: read
  pull-requests: write
  actions: read  # needed to download artifacts from the triggering workflow

jobs:
  upload:
    name: Upload Benchmark Results
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: bencherdev/bencher@46d007c103827da37db1a25b705dc73d3aaff7e6 # v0.6.3

      - uses: actions/download-artifact@v8
        with:
          name: bench-results
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ github.event.workflow_run.id }}

      - name: Upload to Bencher
        env:
          BENCHER_API_TOKEN: ${{ secrets.BENCHER_API_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          bencher run \
            --project sriracha \
            --branch "$(cat head-ref.txt)" \
            --start-point "$(cat base-ref.txt)" \
            --start-point-hash "$(cat base-sha.txt)" \
            --start-point-clone-thresholds \
            --start-point-reset \
            --testbed ubuntu-latest \
            --adapter go_bench \
            --err \
            --github-actions "${GITHUB_TOKEN}" \
            < results.txt