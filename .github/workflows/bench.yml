name: Benchmark

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  benchmark:
    name: Benchmark
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod

      - name: Raise memlock limit for memguard
        run: sudo prlimit --pid $PPID --memlock=unlimited:unlimited

      - name: Track benchmarks (main)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          BENCHER_API_TOKEN: ${{ secrets.BENCHER_API_TOKEN }}
        run: |
          bencher run \
            --project sriracha \
            --branch main \
            --testbed ubuntu-latest \
            --adapter go_bench \
            "go test -bench=. -benchmem ./..."

      - name: Run benchmarks (PR)
        if: github.event_name == 'pull_request'
        run: go test -bench=. -benchmem ./... | tee results.txt

      - name: Save PR metadata
        if: github.event_name == 'pull_request'
        run: |
          echo "${{ github.event.pull_request.number }}" > pr-number.txt
          echo "${{ github.head_ref }}" > head-ref.txt
          echo "${{ github.base_ref }}" > base-ref.txt
          echo "${{ github.event.pull_request.base.sha }}" > base-sha.txt

      - uses: actions/upload-artifact@v7
        if: github.event_name == 'pull_request'
        with:
          name: bench-results
          path: |
            results.txt
            pr-number.txt
            head-ref.txt
            base-ref.txt
            base-sha.txt