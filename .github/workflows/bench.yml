name: Benchmark

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  benchmark:
    name: Benchmark
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Go
        uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with:
          go-version-file: go.mod

      - name: Raise memlock limit for memguard
        run: sudo prlimit --pid $PPID --memlock=unlimited:unlimited

      - uses: bencherdev/bencher@46d007c103827da37db1a25b705dc73d3aaff7e6 # v0.6.3

      - name: Track benchmarks (main)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: go test -bench=. -benchmem ./... | tee results.txt

      - name: Run quality benchmark (main)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          SRIRACHA_BENCH_OUT: ${{ github.workspace }}/quality.json
        run: go test -tags=bench -count=1 -timeout 10m ./test/bench/...

      - uses: actions/upload-artifact@v4
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        with:
          name: bench-results-main
          path: |
            results.txt
            quality.json

      - name: Run benchmarks (PR)
        if: github.event_name == 'pull_request'
        run: go test -bench=. -benchmem ./... | tee results.txt

      - name: Run quality benchmark (PR)
        if: github.event_name == 'pull_request'
        env:
          SRIRACHA_BENCH_OUT: ${{ github.workspace }}/quality.json
        run: go test -tags=bench -count=1 -timeout 10m ./test/bench/...

      - name: Save PR metadata
        if: github.event_name == 'pull_request'
        run: |
          echo "${{ github.event.pull_request.number }}" > pr-number.txt
          echo "${{ github.head_ref }}" > head-ref.txt
          echo "${{ github.base_ref }}" > base-ref.txt
          echo "${{ github.event.pull_request.base.sha }}" > base-sha.txt

      - uses: actions/upload-artifact@v4
        if: github.event_name == 'pull_request'
        with:
          name: bench-results
          path: |
            results.txt
            quality.json
            pr-number.txt
            head-ref.txt
            base-ref.txt
            base-sha.txt