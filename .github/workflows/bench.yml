name: Benchmark

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  benchmark:
    name: Benchmark
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod

      - name: Raise memlock limit for memguard
        run: sudo prlimit --pid $PPID --memlock=unlimited:unlimited

      - uses: bencherdev/bencher@fa25a72c516046b4c0e31659bef70c5266b0f94d # v0.6.4

      - name: Track benchmarks (main)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: go test -bench=. -benchmem ./... | tee results.txt

      - name: Run quality benchmark (main)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          SRIRACHA_BENCH_OUT: ${{ github.workspace }}/quality.json
        run: go test -tags=bench -count=1 -timeout 10m ./test/bench/...

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        with:
          name: bench-results-main
          path: |
            results.txt
            quality.json

      - name: Run benchmarks (PR)
        if: github.event_name == 'pull_request'
        run: go test -bench=. -benchmem ./... | tee results.txt

      - name: Run quality benchmark (PR)
        if: github.event_name == 'pull_request'
        env:
          SRIRACHA_BENCH_OUT: ${{ github.workspace }}/quality.json
        run: go test -tags=bench -count=1 -timeout 10m ./test/bench/...

      - name: Save PR metadata
        if: github.event_name == 'pull_request'
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          HEAD_REF: ${{ github.head_ref }}
          BASE_REF: ${{ github.base_ref }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          printf '%s\n' "$PR_NUMBER" > pr-number.txt
          printf '%s\n' "$HEAD_REF" > head-ref.txt
          printf '%s\n' "$BASE_REF" > base-ref.txt
          printf '%s\n' "$BASE_SHA" > base-sha.txt

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        if: github.event_name == 'pull_request'
        with:
          name: bench-results
          path: |
            results.txt
            quality.json
            pr-number.txt
            head-ref.txt
            base-ref.txt
            base-sha.txt