name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 8 * * 1'

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install gotestsum
        run: go install gotest.tools/gotestsum@v1.13.0

      - name: Test with coverage
        run: gotestsum --junitfile test-results.xml -- -race -timeout 5m -coverprofile=coverage.out ./...

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Upload test results to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/test-results-action@v1
        with:
          token: ${{ secrets.CODECOV_TOKEN }}

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v8
        with:
          version: v2.4.0

  proto:
    name: Proto
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: bufbuild/buf-action@v1
        with:
          push: false
          format: false
          breaking_against: ${{ github.event_name == 'pull_request' && format('https://github.com/{0}.git#branch={1}', github.repository, github.base_ref) || '' }}

  generated:
    name: Generated files
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install mockery
        run: go install github.com/vektra/mockery/v2@v2.53.6

      - name: Regenerate mocks
        run: mockery

      - name: Check for uncommitted changes
        run: git diff --exit-code

  test-matrix:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install gotestsum
        run: go install gotest.tools/gotestsum@v1.13.0

      - name: Test
        run: gotestsum --junitfile test-results.xml -- -timeout 5m ./...

      - name: Upload test results to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/test-results-action@v1
        with:
          token: ${{ secrets.CODECOV_TOKEN }}

  leakhound:
    name: leakhound
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install leakhound
        run: go install github.com/nilpoona/leakhound/cmd/leakhound@latest

      - name: Run leakhound
        run: leakhound ./...

  govulncheck:
    name: govulncheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: golang/govulncheck-action@v1
        with:
          go-version-file: go.mod
          go-package: ./...

  fuzz:
    name: Fuzz
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Raise memlock limit for memguard
        run: sudo prlimit --pid $PPID --memlock=unlimited:unlimited

      - name: Fuzz
        run: |
          go test -fuzz=^FuzzParseFieldPath$     -fuzztime=30s go.sriracha.dev/sriracha
          go test -fuzz=^FuzzNormalize$          -fuzztime=30s go.sriracha.dev/normalize
          go test -fuzz=^FuzzNormalizeDate$      -fuzztime=30s go.sriracha.dev/normalize
          go test -fuzz=^FuzzNormalizeCountry$   -fuzztime=30s go.sriracha.dev/normalize
          go test -fuzz=^FuzzNgrams$             -fuzztime=30s go.sriracha.dev/token
          go test -fuzz=^FuzzTokenizeRecord$     -fuzztime=30s go.sriracha.dev/token
          go test -fuzz=^FuzzTokenizeRecordBloom$  -fuzztime=30s go.sriracha.dev/token
          go test -fuzz=^FuzzProtoToTokenRecord$  -fuzztime=30s go.sriracha.dev/transport/server
          go test -fuzz=^FuzzBuildFieldValues$    -fuzztime=30s go.sriracha.dev/transport/server
