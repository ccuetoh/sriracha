name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 8 * * 1'

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Test with coverage
        run: go test -coverprofile=coverage.out ./...

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v8
        with:
          version: v2.4.0

  leakhound:
    name: leakhound
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install leakhound
        run: go install github.com/nilpoona/leakhound/cmd/leakhound@latest

      - name: Run leakhound
        run: leakhound ./...

  govulncheck:
    name: govulncheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: golang/govulncheck-action@v1
        with:
          go-version-file: go.mod
          go-package: ./...

  fuzz:
    name: Fuzz
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - { pkg: go.sriracha.dev/sriracha,  func: FuzzParseFieldPath      }
          - { pkg: go.sriracha.dev/normalize, func: FuzzNormalize            }
          - { pkg: go.sriracha.dev/normalize, func: FuzzNormalizeDate        }
          - { pkg: go.sriracha.dev/normalize, func: FuzzNormalizeCountry     }
          - { pkg: go.sriracha.dev/token,     func: FuzzNgrams               }
          - { pkg: go.sriracha.dev/token,     func: FuzzTokenizeRecord       }
          - { pkg: go.sriracha.dev/token,     func: FuzzTokenizeRecordBloom  }
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Fuzz
        run: go test -fuzz=^${{ matrix.func }}$ -fuzztime=30s ${{ matrix.pkg }}
