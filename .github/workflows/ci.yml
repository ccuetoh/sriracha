name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 8 * * 1'

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install gotestsum
        run: go install gotest.tools/gotestsum@v1.13.0

      - name: Test with coverage
        run: gotestsum --junitfile test-results.xml -- -race -timeout 5m -coverprofile=coverage.out ./...

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Upload test results to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/test-results-action@v1
        with:
          token: ${{ secrets.CODECOV_TOKEN }}

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v8
        with:
          version: v2.4.0

  proto:
    name: Proto
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install buf
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release download --repo bufbuild/buf --pattern 'buf-Linux-x86_64' --dir /tmp/buf
          sudo install /tmp/buf/buf-Linux-x86_64 /usr/local/bin/buf

      - name: Lint proto
        run: buf lint

      - name: Fetch base branch
        if: github.event_name == 'pull_request'
        run: git fetch origin ${{ github.base_ref }}:${{ github.base_ref }}

      - name: Check for breaking proto changes
        if: github.event_name == 'pull_request'
        run: buf breaking --against ".git#branch=${{ github.base_ref }}"

  generated:
    name: Generated files
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install mockery
        run: go install github.com/vektra/mockery/v3@v3.7.0

      - name: Regenerate mocks
        run: mockery

      - name: Check for uncommitted changes
        run: git diff --exit-code

  test-matrix:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install gotestsum
        run: go install gotest.tools/gotestsum@v1.13.0

      - name: Test
        run: gotestsum --junitfile test-results.xml -- -timeout 5m ./...

      - name: Upload test results to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/test-results-action@v1
        with:
          token: ${{ secrets.CODECOV_TOKEN }}

  leakhound:
    name: leakhound
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install leakhound
        run: go install github.com/nilpoona/leakhound/cmd/leakhound@latest

      - name: Run leakhound
        run: leakhound ./...

  govulncheck:
    name: govulncheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: golang/govulncheck-action@v1
        with:
          go-version-file: go.mod
          go-package: ./...

  fuzz:
    name: Fuzz
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Raise memlock limit for memguard
        run: sudo prlimit --pid $PPID --memlock=unlimited:unlimited

      - name: Fuzz
        env:
          FUZZTIME: 60s
        run: |
          set -euo pipefail
          failed=0
          for pkg in $(go list ./...); do
            targets=$(go test -list '^Fuzz' "$pkg" 2>/dev/null | awk '/^Fuzz/')
            for target in $targets; do
              echo "::group::$pkg $target"
              if ! go test -fuzz="^${target}$" -fuzztime="$FUZZTIME" "$pkg"; then
                failed=1
              fi
              echo "::endgroup::"
            done
          done
          exit "$failed"
