name: leakhound

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  leakhound:
    name: leakhound
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install leakhound
        run: go install github.com/nilpoona/leakhound@latest

      - name: Run leakhound
        run: leakhound ./...
