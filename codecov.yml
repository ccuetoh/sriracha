ignore:
  - "mock"
  - "transport/proto"
  - "test/integration"

flags:
  integration:
    paths:
      - "transport/"
      - "indexer/"
      - "audit/"
      - "token/"
      - "fieldset/"
      - "normalize/"
      - "sriracha/"
    carryforward: true

comment:
  layout: " diff, flags, files"
  behavior: default
  require_changes: false
  require_base: false
  require_head: true
  hide_project_coverage: false

coverage:
  status:
    project:
      default:
        target: auto
        threshold: 5%
    patch:
      default:
        target: 90%
        threshold: 5%