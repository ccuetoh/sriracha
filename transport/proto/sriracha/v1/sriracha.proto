syntax = "proto3";

package sriracha.v1;

option go_package = "go.sriracha.dev/transport/proto/sriracha/v1;srirachav1";

// ── Capabilities ─────────────────────────────────────────────────

message GetCapabilitiesRequest {}

message GetCapabilitiesResponse {
  string spec_version = 1;
  repeated string fieldset_versions = 2;
  repeated string supported_fields = 3;
  repeated MatchMode match_modes = 4;
  RateLimits rate_limits = 5;
}

message RateLimits {
  uint32 queries_per_minute = 1;
  uint32 bulk_records_per_day = 2;
}

// ── Query ─────────────────────────────────────────────────────────

message QueryRequest {
  string session_id = 1;
  bytes token_record = 2;
  string fieldset_version = 3;
  MatchMode match_mode = 4;
  MatchConfig match_config = 5;
  repeated string requested_fields = 6;
  ConsentPolicy policy = 7;
}

message QueryResponse {
  string session_id = 1;
  float confidence = 2;
  repeated FieldValue fields = 3;
  repeated string not_held = 4;
  repeated string not_found = 5;
  MatchStatus status = 6;
}

message FieldValue {
  string field_path = 1;
  string value = 2;
}

enum MatchStatus {
  MATCH_STATUS_UNSPECIFIED = 0;
  MATCH_STATUS_MATCHED = 1;
  MATCH_STATUS_NO_MATCH = 2;
  MATCH_STATUS_BELOW_THRESHOLD = 3;
  MATCH_STATUS_MULTIPLE_CANDIDATES = 4;
}

// ── Bulk Linkage ──────────────────────────────────────────────────

message BulkLinkRequest {
  string session_id = 1;
  repeated bytes token_records = 2;
  repeated string record_refs = 3;
  ConsentPolicy policy = 4;
}

message BulkLinkResponse {
  string session_id = 1;
  repeated MatchResultEntry entries = 2;
}

message MatchResultEntry {
  string record_ref = 1;
  float confidence = 2;
  repeated FieldValue fields = 3;
  repeated string not_held = 4;
  repeated string not_found = 5;
  MatchStatus status = 6;
}

// ── Shared ───────────────────────────────────────────────────────

enum MatchMode {
  MATCH_MODE_UNSPECIFIED = 0;
  MATCH_MODE_DETERMINISTIC = 1;
  MATCH_MODE_PROBABILISTIC = 2;
}

message MatchConfig {
  float threshold = 1;
  uint32 max_results = 2;
  repeated FieldWeight field_weights = 3;
}

message FieldWeight {
  string field_path = 1;
  float weight = 2;
}

message ConsentPolicy {
  string issuer_id = 1;
  string target_id = 2;
  string purpose = 3;
  int64 issued_at = 4;
  int64 expires_at = 5;
  bytes signature = 6;
  string policy_id = 7;
}

// TokenRecord is the wire representation of a tokenised record,
// serialised as the bytes value of QueryRequest.token_record.
message TokenRecord {
  string fieldset_version = 1;
  MatchMode mode = 2;
  string algo = 3;
  bytes payload = 4;
  bytes checksum = 5;
}

// ── Service ───────────────────────────────────────────────────────

service SrirachaService {
  rpc GetCapabilities(GetCapabilitiesRequest) returns (GetCapabilitiesResponse);
  rpc Query(QueryRequest) returns (QueryResponse);
  rpc BulkLink(stream BulkLinkRequest) returns (stream BulkLinkResponse);
}